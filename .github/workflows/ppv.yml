name: 🚀 Update PPVLand Playlist 📺

on:
  schedule:
    - cron: '0 * * * *'  # ⏰ 每小时自动运行
  workflow_dispatch:     # 允许手动点击运行

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 1  # ⚡ 关键：只拉取最新提交，解决 2GB 下载慢的问题

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright urllib3 aiohttp --no-cache-dir
          playwright install firefox
          playwright install-deps

      - name: 🎯 Run PPV Scraper
        run: python ppv.py  # 只运行目前正常的脚本

      - name: 💾 Commit & Push Changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add PPVLand.m3u8

          if git diff --cached --quiet; then
            echo "✅ No changes to playlist. Skipping commit."
            exit 0
          fi

          git commit -m "🔁 Auto-update: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          
          # 强制推送或简单推送，因为我们用了浅克隆(depth 1)
          git push origin main
