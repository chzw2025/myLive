name: 🚀 Update PPVLand Playlist 📺

on:
  schedule:
    - cron: '0 * * * *'  # ⏰ 每小时运行一次
  workflow_dispatch:     # 允许手动触发

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v3
        with:
          # 关键修改：只拉取最新一层，不再拉取 2GB 的历史数据
          fetch-depth: 1 

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Install Python dependencies
        # 优化：加上 --no-cache-dir 可以稍微加快安装速度
        run: |
          python -m pip install --upgrade pip
          pip install playwright urllib3 aiohttp --no-cache-dir
          playwright install firefox
          playwright install-deps

      - name: 🎯 Run scraping script
        # 这里只运行你需要的脚本，那个报错的脚本如果不想要了，就不要在这里写它
        run: python ppv.py

      - name: 💾 Commit & Safely Push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 只添加你关心的直播源文件
          git add PPVLand.m3u8

          # 检查是否有实际变化
          if git diff --cached --quiet; then
            echo "✅ 内容没有变化，跳过提交"
            exit 0
          fi

          git commit -m "🔁 自动更新: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

          # 因为使用了 fetch-depth: 1，push 时如果远程有变动，
          # 最稳妥的方式是强制覆盖（如果你确定这个仓库只有机器在写数据）
          # 或者使用简单的 push。
          git push origin main
